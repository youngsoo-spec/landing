<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GetStockLedger — For small independent RIA firms</title>
<meta name="description" content="An early-stage B2B workflow tool for small independent RIA firms.">
<meta name="theme-color" content="#FFFFFF">
<style>
  :root{
    --paper:#FFFFFF;
    --ink:#46515A;
    --accent:#62778A;
    --muted:#606870;
    --rule:#DFE4E8;
    --soft:#F6F8F9;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    max-width:760px;
    width:100%;
    margin:0 auto;
    padding:72px 28px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    width:fit-content;
    color:var(--ink);
    font-size:24px;
    font-weight:750;
    letter-spacing:-0.04em;
    line-height:1.2;
    margin-bottom:88px;
  }
  .brand::before{
    content:'';
    width:28px;
    height:2px;
    background:var(--accent);
  }
  h1{
    max-width:690px;
    font-weight:730;
    font-size:clamp(38px,6.5vw,64px);
    letter-spacing:-0.055em;
    line-height:1.06;
    margin-bottom:28px;
    text-wrap:balance;
  }
  .sub{
    font-size:18px;
    line-height:1.65;
    color:var(--muted);
    margin-bottom:48px;
  }
  .status{
    display:inline-block;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--accent);
    border:1px solid var(--rule);
    background:var(--soft);
    padding:10px 14px;
    margin-bottom:32px;
  }
  .partner{
    border-top:1px solid var(--rule);
    padding-top:28px;
    font-size:16px;
    line-height:1.65;
    color:var(--muted);
  }
  .partner a{
    color:var(--ink);
    font-weight:650;
    text-decoration:underline;
    text-decoration-color:var(--accent);
    text-underline-offset:5px;
  }
  .partner a:hover{color:var(--accent);}
  .partner a:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:3px;
  }
  footer{
    max-width:760px;
    width:100%;
    margin:0 auto;
    padding:0 28px 32px;
    border-top:1px solid var(--rule);
    padding-top:24px;
    font-size:12px;
    color:var(--muted);
  }
  @media (prefers-reduced-motion:no-preference){
    main > *{
      opacity:0;
      transform:translateY(6px);
      animation:rise .5s ease forwards;
    }
    main > *:nth-child(2){animation-delay:.05s;}
    main > *:nth-child(3){animation-delay:.1s;}
    main > *:nth-child(4){animation-delay:.15s;}
    main > *:nth-child(5){animation-delay:.2s;}
    main > *:nth-child(6){animation-delay:.25s;}
    @keyframes rise{to{opacity:1;transform:none;}}
  }
  @media (max-width:560px){
    main{padding:36px 20px 56px;}
    .brand{margin-bottom:72px;font-size:22px;}
    h1{font-size:clamp(38px,12vw,48px);}
    .sub{font-size:17px;}
    footer{padding:24px 20px 28px;}
  }
</style>
</head>
<body>
<main>
  <div class="brand">GetStockLedger</div>

  <h1>Important SEC filings.<br>Less follow-up work.</h1>

  <p class="sub">A B2B workflow tool for small independent RIA firms.</p>

  <span class="status">In early development</span>

  <p class="partner">
    We&rsquo;re looking for 3&ndash;5 independent RIA firms to join an upcoming closed beta as design partners.<br>
    Interested? <a href="mailto:youngsoo@getstockledger.com">youngsoo@getstockledger.com</a>
  </p>
</main>
<footer>&copy; 2026 GetStockLedger</footer>
</body>
</html>
